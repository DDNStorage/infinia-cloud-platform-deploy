- name: Ensure .aws directory exists
  file:
    path: /home/ubuntu/.aws
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0700'
  become: true
  delegate_to: "{{ target_host }}"

- name: Write AWS credentials
  copy:
    dest: /home/ubuntu/.aws/credentials
    content: |
      [default]
      aws_access_key_id={{ s3_access_key }}
      aws_secret_access_key={{ s3_secret_key }}
    owner: ubuntu
    group: ubuntu
    mode: '0600'
  become: true
  delegate_to: "{{ target_host }}"

- name: Install unzip
  apt:
    name: unzip
    state: present
    update_cache: true
  become: true
  delegate_to: "{{ target_host }}"

- name: Download AWS CLI v2
  shell: |
    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
  args:
    creates: /tmp/awscliv2.zip
  become: true
  delegate_to: "{{ target_host }}"

- name: Unzip and install AWS CLI v2
  shell: |
    unzip -o /tmp/awscliv2.zip -d /tmp
    sudo /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws
  become: true
  delegate_to: "{{ target_host }}"

- name: Create a timestamped test file on client node
  shell: |
    TS=$(date +%Y%m%dT%H%M%S)
    echo "S3 test file created at $TS" > "/home/ubuntu/test-${TS}.txt"
    echo "test-${TS}" > /tmp/test_filename.txt
  args:
    executable: /bin/bash
  register: test_file_creation
  become: true
  delegate_to: "{{ target_host }}"

- name: Read test filename from client
  slurp:
    src: /tmp/test_filename.txt
  register: test_filename_raw
  become: true
  delegate_to: "{{ target_host }}"

- name: Set per-host test filename
  set_fact:
    test_filename: "{{ test_filename_raw.content | b64decode | trim }}"
  delegate_to: "{{ target_host }}"
  become: true

- name: Create S3 bucket
  shell: |
    AWS_SHARED_CREDENTIALS_FILE=/home/ubuntu/.aws/credentials \
    aws --no-verify-ssl \
      --endpoint-url=https://{{ hostvars[groups['role_realm'][0]].public_ip_address }}:8111 \
      s3api create-bucket --bucket my-test-bucket
  become: true
  delegate_to: "{{ target_host }}"

- name: Upload test file to S3 bucket
  shell: |
    AWS_SHARED_CREDENTIALS_FILE=/home/ubuntu/.aws/credentials \
    aws --no-verify-ssl \
      --endpoint-url=https://{{ hostvars[groups['role_realm'][0]].public_ip_address }}:8111 \
      s3 cp "/home/ubuntu/{{ test_filename }}.txt" s3://my-test-bucket/
  become: true
  delegate_to: "{{ target_host }}"
  register: s3_upload

- name: List objects in S3 to verify upload
  shell: |
    AWS_SHARED_CREDENTIALS_FILE=/home/ubuntu/.aws/credentials \
    aws --no-verify-ssl \
      --endpoint-url=https://{{ hostvars[groups['role_realm'][0]].public_ip_address }}:8111 \
      s3api list-objects-v2 \
      --bucket my-test-bucket \
      --output json \
      --query "Contents[].Key"
  become: true
  delegate_to: "{{ target_host }}"
  register: s3_list

- name: Assert S3 object exists
  assert:
    that:
      - s3_list.stdout is search(test_filename + '.txt')
    fail_msg: "❌ File {{ test_filename }}.txt not found in S3 list"
    success_msg: "✅ File {{ test_filename }}.txt found in S3 list"
