---
- name: Install Red Client packages and testing tools on client nodes
  hosts: client_nodes
  become: true
  gather_facts: true
  vars:
    red_version: "2.2.28"
    base_url: "https://storage.googleapis.com/ddn-redsetup-public/releases/ubuntu/24.04"
    qatest_url: "https://storage.googleapis.com/ddn-redsetup-public/releases/ubuntu/24.04/qatest"
    arch: "amd64"
    packages:
      - name: "red-client-common"
        url: "{{ base_url }}/red-client-common_{{ red_version }}_{{ arch }}.deb"
      - name: "red-client-tools"
        url: "{{ base_url }}/red-client-tools_{{ red_version }}_{{ arch }}.deb"
      - name: "redcli"
        url: "{{ base_url }}/redcli_{{ red_version }}_{{ arch }}.deb"

  tasks:
    - name: Update package cache
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name:
          - wget
          - curl
          - golang-go
          - ca-certificates
          - unzip
        state: present

    - name: Create temporary directory
      file:
        path: /tmp/red-client-install
        state: directory
        mode: '0755'

    - name: Download Red client packages
      get_url:
        url: "{{ item.url }}"
        dest: "/tmp/red-client-install/{{ item.name }}_{{ red_version }}_{{ arch }}.deb"
        mode: '0644'
        timeout: 30
      loop: "{{ packages }}"
      register: download_result
      retries: 3
      delay: 5

    - name: Install Red client packages
      apt:
        deb: "/tmp/red-client-install/{{ item.name }}_{{ red_version }}_{{ arch }}.deb"
        state: present
      loop: "{{ packages }}"

    - name: Download and build warp-ddn
      shell: |
        cd /tmp/red-client-install
        wget {{ qatest_url }}/warp-ddn.zip
        unzip warp-ddn.zip
        cd warp
        go build -o warp-ddn
        chmod +x warp-ddn
        sudo mv warp-ddn /usr/local/bin/
      environment:
        PATH: "/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"

    - name: Download go-s3-tests
      get_url:
        url: "{{ qatest_url }}/go-s3-tests"
        dest: "/usr/local/bin/go-s3-tests"
        mode: '0755'
        timeout: 30
      retries: 3
      delay: 5

    - name: Verify tool installations
      shell: |
        if command -v {{ item }} &> /dev/null; then
          echo "{{ item }} installed successfully"
          {{ item }} --version 2>/dev/null || {{ item }} --help 2>/dev/null | head -1 || echo "Version info not available"
        else
          echo "{{ item }} installation failed"
          exit 1
        fi
      register: tool_check
      loop:
        - redcli
        - warp-ddn
        - go-s3-tests

    - name: Display installation results
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ tool_check.results }}"

    - name: Clean up temporary files
      file:
        path: /tmp/red-client-install
        state: absent