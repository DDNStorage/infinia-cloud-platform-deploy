- name: Infinia Setup and Configuration
  hosts: all
  vars_files:
    - vars.yml
    - secret.yml
  tasks:
    - name: Create Log Directory
      file:
        path: /var/log/infinia
        state: directory
        mode: '0755'
      become: yes

    - name: Copy Infinia Scripts 
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: '0755'
      loop:
        - { src: "./infinia-node-setup.sh", dest: "/tmp/infinia-node-setup.sh" }
        - { src: "./infinia-cluster-configure.sh", dest: "/tmp/infinia-cluster-configure.sh" }
      become: yes
      tags: copy

    - name: Log Copy Completion
      shell: 'echo "$(date) ✅ Infinia setup scripts copied successfully." >> /var/log/infinia/setup.log'
      become: yes

    - block: # Infinia Setup
        - name: Log Realm Node Setup Start
          shell: 'echo "$(date) 🚀 Starting Realm Node Setup..." >> /var/log/infinia/setup.log'
          become: yes
        
        - name: Reset Redsetup Before Running Setup
          shell: |
            echo "$(date) 🔄 Running redsetup --reset..." >> /var/log/infinia/setup.log
            sudo rm -rf /etc/red/deploy/config.lock
            sudo redsetup --reset >> /var/log/infinia/setup.log 2>&1 || echo "⚠️ Redsetup Reset Failed!" >> /var/log/infinia/setup.log
          become: yes
          tags: cleanup
          when: "'cleanup' in ansible_run_tags"

        - name: Realm Node Setup
          shell: |
            bash -c '
            echo "$(date) ✅ Running Infinia Node Setup..." >> /var/log/infinia/setup.log
            /tmp/infinia-node-setup.sh \
              --realm-entry \
              --version {{ infinia_version }} \
              --realm-secret "{{ realm_secret }}" \
              --admin-password "{{ admin_password }}" \
              --skip-reboot >> /var/log/infinia/setup.log 2>&1
            '
          args:
            chdir: /tmp
          when: "'role_realm' in group_names"
          become: yes

        - name: Reboot realm node
          reboot:
            reboot_timeout: 600
          when: "'role_realm' in group_names"
          become: yes

        - name: Wait for 60 seconds after reboot
          pause:
            seconds: 60
          when: "'role_realm' in group_names"

        - name: Log Non-Realm Node Setup Start
          shell: 'echo "$(date) 🚀 Starting Non-Realm Node Setup..." >> /var/log/infinia/setup.log'
          become: yes

        - name: Non-Realm Node Setup
          shell: |
            bash -c '
            echo "$(date) ✅ Running Infinia Node Setup..." >> /var/log/infinia/setup.log
            /tmp/infinia-node-setup.sh \
              --non-realm-entry \
              --ip {{ hostvars[groups["role_realm"][0]].private_ip_address }} \
              --version {{ infinia_version }} \
              --realm-secret "{{ realm_secret }}" \
              --admin-password "{{ admin_password }}" \
              --skip-reboot >> /var/log/infinia/setup.log 2>&1
            '
          args:
            chdir: /tmp
          when: "'role_nonrealm' in group_names"
          become: yes

        - name: Reboot non-realm node
          reboot:
            reboot_timeout: 600
          when: "'role_nonrealm' in group_names"
          become: yes

        - name: Wait for 60 seconds after reboot
          pause:
            seconds: 60
          when: "'role_nonrealm' in group_names"
      tags: setup

    - block: # Infinia Cluster Setup
        - name: Log Cluster Configuration Start
          shell: 'echo "$(date) 🚀 Starting Infinia Cluster Configuration..." >> /var/log/infinia/setup.log'
          become: yes

        - name: Copy Cluster Configuration Script 
          copy:
            src: "./infinia-cluster-configure.sh"
            dest: "/tmp/infinia-cluster-configure.sh"
            mode: '0755'
          become: yes
          tags: copy

        - name: Configure the Infinia Cluster
          shell: |
            bash -c '
            echo "$(date) 🔄 Configuring Infinia Cluster..." >> /var/log/infinia/setup.log
            /tmp/infinia-cluster-configure.sh \
              --admin-password "{{ admin_password }}" \
              --license-key "{{ license_key }}" >> /var/log/infinia/setup.log 2>&1
            '
          become: yes

      when: "'role_realm' in group_names"
      become: yes
      tags: configure

    - block: # Verify Infinia setup
        - name: Set expected node count from roles
          set_fact:
            expected_node_count: "{{ groups['role_realm'] | length + groups['role_nonrealm'] | length }}"

        - name: Verify Infinia Cluster Configuration
          shell: |
            bash -c '
            redcli user login realm_admin -p "{{ admin_password }}" >> /var/log/infinia/setup.log 2>&1
            cluster_status=$(redcli cluster show -o json | jq -r ".cluster_state")
            total_nodes=$(redcli cluster show -o json | jq ".instances | length")
            evicted_cats=$(redcli cluster show -o json | jq "[.cats[] | select(.evicted == true)] | length")

            echo "=== Cluster Verification Summary ==="
            echo "🔹 Cluster State: $cluster_status"
            echo "🔹 Total Nodes: $total_nodes"
            echo "🔹 Evicted CATs: $evicted_cats"
            echo "===================================="

            if [[ "$cluster_status" != "running" ]]; then
              echo "❌ Cluster is NOT running!"
              exit 1
            fi

            if [[ "$evicted_cats" -ne 0 ]]; then
              echo "❌ Some CATs are evicted ($evicted_cats)!"
              exit 1
            fi

            if [[ "$total_nodes" -ne {{ expected_node_count }} ]]; then
              echo "❌ Number of nodes ($total_nodes) does not match expected ({{ expected_node_count }})!"
              exit 1
            fi

            echo "✅ Cluster is correctly configured!"
            '
          become: yes
          register: cluster_verification
          failed_when: 
            - cluster_verification.rc != 0

        - name: Display Cluster Verification Output
          debug:
            msg: "{{ cluster_verification.stdout_lines | select('search', 'Cluster State|Total Nodes|Evicted CATs|✅|❌') | list }}"
      when: "'role_realm' in group_names"
      become: yes
      tags: verify

    - block: # S3 Client Instance Setup and Test
        - name: Create S3 test user and capture credentials
          shell: |
            set -e
            echo "🔐 Logging in as realm_admin..."
            redcli user login realm_admin -p "{{ admin_password }}"
            echo "🪪 Creating S3 access for s3_test_user..."
            OUTPUT=$(redcli s3 access add s3_test_user -t red -r red/red/redobj -e 10y)
            echo "$OUTPUT" > /tmp/s3_access_output.txt
          args:
            executable: /bin/bash
          become: true
          delegate_to: "{{ groups['role_realm'][0] }}"
          run_once: true

        - name: Fetch raw S3 credential output from realm
          slurp:
            src: /tmp/s3_access_output.txt
          register: raw_creds
          delegate_to: "{{ groups['role_realm'][0] }}"
          become: true

        - name: Slurp redcli output
          slurp:
            src: /tmp/s3_access_output.txt
          register: raw_creds
          delegate_to: "{{ groups['role_realm'][0] }}"
          run_once: true
          become: true

        - name: Debug decoded credentials output
          debug:
            msg: "{{ raw_creds.content | b64decode }}"
          run_once: true

        - name: Extract redcli output lines
          set_fact:
            redcli_lines: "{{ (raw_creds.content | b64decode).split('\n') }}"
          run_once: true

        - name: Extract S3 credentials from redcli_lines
          set_fact:
            s3_access_key: "{{ redcli_lines | select('search', '^│ S3_KEY') | list | first | regex_findall('S3_KEY\\s*│\\s*(\\S+)') | first }}"
            s3_secret_key: "{{ redcli_lines | select('search', '^│ S3_SECRET') | list | first | regex_findall('S3_SECRET\\s*│\\s*(\\S+)') | first }}"
          run_once: true

        - name: Show parsed credentials
          debug:
            msg:
              - "S3 Access Key: {{ s3_access_key }}"
              - "S3 Secret Key: {{ s3_secret_key }}"

        - name: Fail if access key is empty
          fail:
            msg: "❌ Failed to parse S3 access key. Check redcli output format."
          when: s3_access_key == ''
          run_once: true

        - name: Fail if secret key is empty
          fail:
            msg: "❌ Failed to parse S3 secret key. Check redcli output format."
          when: s3_secret_key == ''
          run_once: true

        - name: Show parsed AWS credentials
          debug:
            msg: "AccessKey: {{ s3_access_key }}, SecretKey: {{ s3_secret_key }}"

        - name: Setup S3 test client on each client node
          include_tasks: s3_client_setup.yml
          loop: "{{ groups['client_nodes'] }}"
          loop_control:
            label: "{{ item }}"
          vars:
            target_host: "{{ item }}"
      tags: s3-test

