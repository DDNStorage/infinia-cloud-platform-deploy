- name: Infinia Setup and Configuration
  hosts: all
  vars_files:
    - vars.yml
    - secret.yml
  tasks:
    - name: Create log and script directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /var/log/infinia
        - /opt/infinia
      become: yes

    - name: Copy Infinia Scripts (persisted)
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: '0755'
      loop:
        - { src: "./infinia-node-setup.sh", dest: "/opt/infinia/infinia-node-setup.sh" }
        - { src: "./infinia-cluster-configure.sh", dest: "/opt/infinia/infinia-cluster-configure.sh" }
      become: yes
      tags: copy

    - name: Log Copy Completion
      shell: 'echo "$(date) ✅ Infinia setup scripts copied successfully." >> /var/log/infinia/setup.log'
      become: yes

    - block: # Infinia Setup (Realm + Non-Realm)
        - name: Reset Redsetup Before Node Setup
          shell: |
            echo "$(date) 🔄 Running redsetup --reset..." >> /var/log/infinia/setup.log
            rm -f /etc/red/deploy/config.lock >> /var/log/infinia/setup.log 2>&1 || echo "⚠️ Lock remove failed" >> /var/log/infinia/setup.log
            redsetup --reset >> /var/log/infinia/setup.log 2>&1 || echo "⚠️ Redsetup reset failed" >> /var/log/infinia/setup.log
          become: yes

        - name: Log Realm Node Setup Start
          shell: 'echo "$(date) 🚀 Starting Realm Node Setup..." >> /var/log/infinia/setup.log'
          when: "'role_realm' in group_names"
          become: yes

        - name: Realm Node Setup
          shell: |
            bash -c '
            echo "$(date) ✅ Running Infinia Realm Node Setup..." >> /var/log/infinia/setup.log
            /opt/infinia/infinia-node-setup.sh \
              --realm-entry \
              --version {{ infinia_version }} \
              --realm-secret "{{ realm_secret }}" \
              --admin-password "{{ admin_password }}" \
              --skip-reboot >> /var/log/infinia/setup.log 2>&1
            '
          args:
            chdir: /opt/infinia
          when: "'role_realm' in group_names"
          become: yes

        - name: Realm Node Reboot
          reboot:
            reboot_timeout: 600
          when: "'role_realm' in group_names"
          become: yes

        - name: Pause after realm reboot
          pause:
            seconds: 60
          when: "'role_realm' in group_names"

        - name: Log Non-Realm Node Setup Start
          shell: 'echo "$(date) 🚀 Starting Non-Realm Node Setup..." >> /var/log/infinia/setup.log'
          when: "'role_nonrealm' in group_names"
          become: yes

        - name: Non-Realm Node Setup
          shell: |
            bash -c '
            echo "$(date) ✅ Running Infinia Non-Realm Node Setup..." >> /var/log/infinia/setup.log
            /opt/infinia/infinia-node-setup.sh \
              --non-realm-entry \
              --ip {{ hostvars[groups["role_realm"][0]].private_ip_address }} \
              --version {{ infinia_version }} \
              --realm-secret "{{ realm_secret }}" \
              --admin-password "{{ admin_password }}" \
              --skip-reboot >> /var/log/infinia/setup.log 2>&1
            '
          args:
            chdir: /opt/infinia
          when: "'role_nonrealm' in group_names"
          become: yes

        - name: Non-Realm Node Reboot
          reboot:
            reboot_timeout: 600
          when: "'role_nonrealm' in group_names"
          become: yes

        - name: Pause after non-realm reboot
          pause:
            seconds: 60
          when: "'role_nonrealm' in group_names"
      tags: setup

    - block: # Infinia Cluster Setup
        - name: Log Cluster Configuration Start
          shell: 'echo "$(date) 🚀 Starting Infinia Cluster Configuration..." >> /var/log/infinia/setup.log'
          become: yes

        - name: Configure the Infinia Cluster
          shell: |
            bash -c '
            echo "$(date) 🔄 Configuring Infinia Cluster..." >> /var/log/infinia/setup.log
            /opt/infinia/infinia-cluster-configure.sh \
              --admin-password "{{ admin_password }}" \
              --license-key "{{ license_key }}" >> /var/log/infinia/setup.log 2>&1
            '
          args:
            chdir: /opt/infinia
          become: yes
      when: "'role_realm' in group_names"
      tags: configure

    - block: # Verify Cluster
        - name: Verify Infinia Cluster Configuration
          shell: |
            bash -c '
            redcli user login realm_admin -p "{{ admin_password }}" >> /var/log/infinia/setup.log 2>&1
            cluster_status=$(redcli cluster show -o json | jq -r ".cluster_state")
            total_nodes=$(redcli cluster show -o json | jq ".instances | length")
            evicted_cats=$(redcli cluster show -o json | jq "[.cats[] | select(.evicted == true)] | length")

            echo "=== Cluster Verification Summary ==="
            echo "🔹 Cluster State: $cluster_status"
            echo "🔹 Total Nodes: $total_nodes"
            echo "🔹 Evicted CATs: $evicted_cats"
            echo "===================================="

            if [[ "$cluster_status" != "running" ]]; then
              echo "❌ Cluster is NOT running!"
              exit 1
            fi

            if [[ "$total_nodes" -ne {{ groups['all'] | length }} ]]; then
              echo "❌ Node count mismatch!"
              exit 1
            fi

            if [[ "$evicted_cats" -ne 0 ]]; then
              echo "❌ Evicted CATs found!"
              exit 1
            fi

            echo "✅ Cluster is correctly configured!"
            '
          become: yes
          register: cluster_verification
          failed_when: cluster_verification.rc != 0

        - name: Display Cluster Verification Output
          debug:
            msg: "{{ cluster_verification.stdout_lines | select('search', 'Cluster State|Total Nodes|Evicted CATs|✅|❌') | list }}"
      when: "'role_realm' in group_names"
      tags: verify
