# BEGIN legacy field, required but will be removed in the future
partnerId: partner
solutionId: solution
# END legacy field, required but will be removed in the future
solutionInfo:
  name: Infinia
  version: 1.0.0
  packagedSoftwareGroups:
  - components:
    - name: Ubuntu
      version: '24.04'
    type: SOFTWARE_GROUP_OS
  - components:
    - name: Infinia
      version: 2.0.23
spec:
  deploymentTool: TERRAFORM
  multiVm:
    adminUrl:
      path: wp-admin
      scheme: HTTPS
    gceMetadataItems:
    - key: infinia-enable-https
      valueFromDeployInputField: httpsEnabled
    - key: enable-os-login
      value: 'TRUE'
    deployInput:
      sections:
      - placement: MAIN
        fields:
        - name: httpsEnabled
          title: HTTPS Enabled
          description: Enabled HTTPS communication.
          booleanCheckbox:
            default_value: true
    firewallRules:
    - port: '80'
      protocol: TCP
    - port: '443'
      protocol: TCP
    networkInterfaces:
      minCount: 1
      maxCount: 8
    passwords:
    - allowSpecialChars: false
      displayLabel: realm entry secret
      length: 14
      metadataKey: realm-entry-secret
    - allowSpecialChars: false
      displayLabel: admin password
      length: 14
      metadataKey: admin-password
    siteUrl:
      scheme: HTTPS
    postDeploy:
      actionItems:
      - heading: Cluster creation using UI
        description: |
          1. Login to https://First Instance Nat IP from deployment outputs
          2. Use username: realm_admin
          3. Use password: Admin Password from deployment outputs
          4. Follow the documentation at https://www.ddn.com/products/infinia/ for cluster creation and configuration
      - heading: Cluster creation using CLI
        description: |
          1. SSH into the First Instance Nat IP from deployment outputs
          2. Run: redcli user login realm_admin
          3. Use Admin Password from deployment outputs
          4. Follow the documentation at https://www.ddn.com/products/infinia/ for cluster creation and configuration
      - heading: Important Security Note
        description: |
          For security purposes, please change both the Admin Password and Realm Entry Secret after your first login
    stackdriver:
      logging:
        defaultOn: false
      monitoring:
        defaultOn: false
