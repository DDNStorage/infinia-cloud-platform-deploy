apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: marketplace-tools
  annotations:
    autogenSpecType: MULTI_VM
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Google Cloud Marketplace Terraform Module
    source:
      repo: https://github.com/GoogleCloudPlatform/marketplace-tools.git
    version: 0.0.1
    actuationTool:
      flavor: Terraform
      version: ">= 0.13"
    description: {}
    softwareGroups:
      - type: SG_OS
        software:
          - title: Ubuntu
            version: "24.04"
      - software:
          - title: Infinia
            version: 2.0.23
  content: {}
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project in which to provision resources.
        varType: string
        required: true
      - name: goog_cm_deployment_name
        description: The name of the deployment and VM instance.
        varType: string
        required: true
      - name: source_image
        description: The image name for the disk for the VM instance.
        varType: string
        defaultValue: projects/ddn-public/global/images/ddn-infinia-2-0-23-ubuntu-2404-amd-2025-03-31
      - name: zone
        description: The zone for the solution to be deployed.
        varType: string
        required: true
      - name: machine_type
        description: The machine type to create, e.g. n2d-standard-16
        varType: string
        defaultValue: n2d-standard-32
      - name: boot_disk_type
        description: The boot disk type for the VM instance.
        varType: string
        defaultValue: pd-ssd
      - name: boot_disk_size
        description: The boot disk size for the VM instance in GBs
        varType: number
        defaultValue: 256
      - name: networks
        description: The network name to attach the VM instance.
        varType: list(string)
        defaultValue:
          - default
      - name: sub_networks
        description: The sub network name to attach the VM instance.
        varType: list(string)
        defaultValue: []
      - name: external_ips
        description: The external IPs assigned to the VM for public access.
        varType: list(string)
        defaultValue:
          - EPHEMERAL
      - name: enable_tcp_443
        description: Allow HTTPS traffic from the Internet
        varType: bool
        defaultValue: true
      - name: tcp_443_source_ranges
        description: Source IP ranges for HTTPS traffic
        varType: string
        defaultValue: ""
      - name: httpsEnabled
        description: Enabled HTTPS communication.
        varType: bool
        defaultValue: true
      - name: enable_cloud_logging
        description: Enables Cloud Logging.
        varType: bool
        defaultValue: false
      - name: enable_cloud_monitoring
        description: Enables Cloud Monitoring.
        varType: bool
        defaultValue: false
      - name: desired_capacity
        description: Desired capacity in TB. Minimum is 63TB.
        varType: number
        defaultValue: 63
      - name: local_disks
        description: The number of local disks to attach to each VM. Default is 24.
        varType: number
        defaultValue: 24
      - name: infinia_version
        varType: string
        defaultValue: 2.0.23
      - name: infinia_license
        description: License key for Infinia deployment.
        varType: string
        required: true
        defaultValue: ""
      - name: num_clients
        description: Number of client VMs to create.
        varType: number
        defaultValue: 0
    outputs:
      - name: admin_password
        description: Password for admin.
      - name: instance_machine_types
        description: Machine types for all compute instances.
      - name: instance_nat_ips
        description: External IPs of all compute instances.
      - name: instance_network
        description: Network of the first compute instance.
      - name: instance_self_links
        description: Self-links for all compute instances.
      - name: instance_zones
        description: Zones for all compute instances.
      - name: realm_entry_secret
        description: Password for realm entry.
      - name: site_url
        description: Site URL of the first instance
      - name: total_capacity
        description: Total capacity provisioned in TB.
      - name: total_throughput
        description: Total throughput provisioned in GB/s.
      - name: vm_count


