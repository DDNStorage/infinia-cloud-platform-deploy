name: Destroy Infinia Infrastructure

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      s3_bucket_name:
        required: true
        type: string
      s3_bucket_region:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      vpc_id:
        required: true
        type: string
      subnet_ids:
        required: true
        type: string
      security_group_id:
        required: true
        type: string
      infinia_version:
        required: true
        type: string
      bucket_name:
        required: true
        type: string

env:
  TERRAFORM_DIR: deployments/aws

jobs:
  destroy-infinia:
    name: Destroy Infrastructure
    runs-on: small-dynamic-amd64-u24

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ inputs.s3_bucket_name }}" \
            -backend-config="key=infinia/state.tfstate" \
            -backend-config="region=${{ inputs.s3_bucket_region }}"

      - name: Terraform Destroy
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var-file=terraform.tfvars \
            -var="infinia_deployment_name=${{ inputs.deployment_name }}" \
            -var="infinia_version=${{ inputs.infinia_version }}" \
            -var="vpc_id=${{ inputs.vpc_id }}" \
            -var="subnet_ids=${{ inputs.subnet_ids }}" \
            -var="security_group_id=${{ inputs.security_group_id }}" \
            -var="bucket_name=${{ inputs.bucket_name }}"
