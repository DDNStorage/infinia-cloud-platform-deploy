name: Deploy Infinia Infrastructure

on:
  workflow_call:
    inputs:
      ami_id:
        required: true
        type: string
      # aws_region:
      #   required: true
      #   type: string
      # deployment_name:
      #   required: true
      #   type: string
      infinia_version:
        required: true
        type: string
      # s3_bucket_name:
      #   required: true
      #   type: string
      # s3_bucket_region:
      #   required: true
      #   type: string
      # vpc_id:
      #   required: true
      #   type: string
      # subnet_ids:
      #   required: true
      #   type: string  # comma-separated string
      # security_group_id:
      #   required: true
      #   type: string
      # bucket_name:
      #   required: true
      #   type: string

env:
  TERRAFORM_DIR: deployments/aws
  ANSIBLE_DIR: deployments/aws/ansible

jobs:
  Infinia-deployment:
    name: Deploy Infinia on AWS
    runs-on: small-dynamic-amd64-u24

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.s3_bucket_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform init

      - name: Parse Subnet IDs
        id: subnet_json
        run: |
          echo "SUBNET_IDS_JSON=$(echo '${{ inputs.subnet_ids }}' | jq -Rc 'split(",")')" >> $GITHUB_ENV

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -var="infinia_ami_id=${{ inputs.ami_id }}" \
            -var="infinia_version=${{ inputs.infinia_version }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Setup Ansible
        run: |
          sudo apt update && sudo apt install software-properties-common -y
          sudo add-apt-repository --yes --update ppa:ansible/ansible
          sudo apt install ansible -y
          sudo pip3 install --upgrade ansible-core ansible boto3 botocore
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Run Ansible playbook
        working-directory: ${{ env.ANSIBLE_DIR }}
        run: |
          echo "${{ secrets.ANSIBLE_VAULT }}" > vault_pass
          ansible-playbook main.yml -i aws_ec2.yml --vault-password-file vault_pass -vv