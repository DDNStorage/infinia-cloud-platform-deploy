name: Deploy Infinia Infrastructure

on:
  workflow_call:
    inputs:
      ami_id:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      infinia_version:
        required: true
        type: string
    secrets:
      INFINIA_ADMIN_PASSWORD:
        required: true

env:
  TERRAFORM_DIR: deployments/aws

jobs:
  Infinia-deployment:
    name: Deploy Infinia on AWS
    runs-on: small-dynamic-amd64-u24

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install AWS CLI v2 (if missing)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y unzip
            curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip -q awscliv2.zip
            sudo ./aws/install --update
          fi
          aws --version

      - name: Install jq (if missing)
        shell: bash
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y jq; }
          jq --version

      # -------- DEPLOY (Terraform) --------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -var="infinia_ami_id=${{ inputs.ami_id }}" \
            -var="infinia_version=${{ inputs.infinia_version }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve tfplan

      # -------- VERIFY (SSM + redcli) --------
      - name: Preflight — tools & secret present
        shell: bash
        env:
          REALM_ADMIN_PASSWORD: ${{ secrets.INFINIA_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          [[ -n "${REALM_ADMIN_PASSWORD:-}" ]] || { echo "::error::Missing secret INFINIA_ADMIN_PASSWORD"; exit 1; }
          for b in aws jq bash sed awk; do
            command -v "$b" >/dev/null || { echo "::error::$b not found"; exit 1; }
          done
          aws sts get-caller-identity >/dev/null
          echo "Preflight OK"

      - name: Collect instance IDs from Terraform state
        id: ids
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          REALM_ID=$(terraform state show -no-color aws_instance.infinia_realm[0] | awk '/^id = /{print $3}')
          NONREALM_IDS=$(terraform state list | grep '^aws_instance\.infinia_none_realm' | \
            while read -r RES; do terraform state show -no-color "$RES" | awk '/^id = /{print $3}'; done | xargs)
          echo "realm_id=$REALM_ID" >> "$GITHUB_OUTPUT"
          echo "nonrealm_ids=$NONREALM_IDS" >> "$GITHUB_OUTPUT"
          echo "Collected realm:  $REALM_ID"
          echo "Collected clients: $NONREALM_IDS"

      - name: Wait for EC2 checks and SSM Online
        shell: bash
        env:
          REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail
          IDS="${{ steps.ids.outputs.realm_id }} ${{ steps.ids.outputs.nonrealm_ids }}"
          IDS=$(echo $IDS)
          [[ -n "$IDS" ]] || { echo "No instances found"; exit 1; }
          NUM=$(wc -w <<< "$IDS")

          deadline=$((SECONDS + 1800))
          while :; do
            OK=$(aws ec2 describe-instance-status --region "$REGION" \
                  --include-all-instances --instance-ids $IDS \
                  --query "length(InstanceStatuses[?InstanceStatus.Status=='ok' && SystemStatus.Status=='ok'])" \
                  --output text)
            echo "EC2 checks OK: $OK / $NUM"
            [[ "$OK" == "$NUM" ]] && break
            (( SECONDS > deadline )) && { echo "Timeout waiting for EC2 checks."; exit 1; }
            sleep 15
          done

          for ID in $IDS; do
            echo "Waiting SSM Online: $ID"
            for i in {1..80}; do
              STATUS=$(aws ssm describe-instance-information --region "$REGION" \
                --query "InstanceInformationList[?InstanceId=='${ID}'].PingStatus" --output text 2>/dev/null || true)
              [[ "$STATUS" == *Online* ]] && { echo "SSM Online for $ID"; break; }
              sleep 5
              [[ $i -eq 80 ]] && { echo "Timeout waiting SSM for $ID"; exit 1; }
            done
          done

    # -------- VERIFY (SSM + redcli via script) --------
    - name: Verify Infinia cluster (script)
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws_region }}
        TERRAFORM_DIR: ${{ env.TERRAFORM_DIR }}
        REALM_ADMIN_PASSWORD: ${{ secrets.INFINIA_ADMIN_PASSWORD }}
      run: |
        chmod +x scripts/verify_infinia.sh
        ./scripts/verify_infinia.sh

