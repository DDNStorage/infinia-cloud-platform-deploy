name: Deploy Infinia Infrastructure

on:
  workflow_call:
    inputs:
      ami_id:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      infinia_version:
        required: true
        type: string
    secrets:
      INFINIA_ADMIN_PASSWORD:
        required: true

env:
  TERRAFORM_DIR: deployments/aws

jobs:
  Infinia-deployment:
    name: Deploy Infinia on AWS
    runs-on: small-dynamic-amd64-u24

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install AWS CLI v2 (if missing)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y unzip
            curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip -q awscliv2.zip
            sudo ./aws/install --update
          fi
          aws --version

      - name: Install jq (if missing)
        shell: bash
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y jq; }
          jq --version

      # -------- DEPLOY (Terraform) --------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -var="infinia_ami_id=${{ inputs.ami_id }}" \
            -var="infinia_version=${{ inputs.infinia_version }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve tfplan

      # -------- VERIFY (SSM + redcli via script) --------
      - name: Verify Infinia cluster (script)
        shell: bash
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          TERRAFORM_DIR: ${{ env.TERRAFORM_DIR }}
          REALM_ADMIN_PASSWORD: ${{ secrets.INFINIA_ADMIN_PASSWORD }}
          AMI_ID: ${{ inputs.ami_id }}
        run: |
          chmod +x scripts/verify_infinia.sh
          ./scripts/verify_infinia.sh
